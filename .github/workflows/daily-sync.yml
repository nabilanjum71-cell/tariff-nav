name: Daily Data Sync

on:
  schedule:
    # Runs every day at 6:00 AM UTC
    - cron: '0 6 * * *'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  sync-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch USITC + WTO + Federal Register data
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/fetch-data.js

      - name: Check if data changed
        id: check-changes
        run: |
          echo "changes=true" >> $GITHUB_OUTPUT

      - name: Trigger Vercel rebuild (only if data changed)
        if: steps.check-changes.outputs.changes == 'true'
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          curl -X POST "$VERCEL_DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            -d '{"reason": "Daily tariff data sync"}'
          echo "✅ Vercel rebuild triggered"

---
name: Weekly Video Sync

on:
  schedule:
    # Runs every Sunday at 4:00 AM UTC
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  sync-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Fetch YouTube videos for chapters
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/fetch-videos.js
